<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NeoLab Solutions</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            padding: 40px;
            text-align: center;
        }

        h2 { color: #2c3e50; margin-bottom: 30px; }

        /* The Button Container */
        .download-link {
            text-decoration: none; /* Removes underline from link */
            display: inline-block;
            margin: 10px;
        }

        /* The Button Style */
        .btn-download {
            background-color: #3498db;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 180px;
        }

        /* Hover Effect */
        .btn-download:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }

        /* Active/Click Effect */
        .btn-download:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <h2>NeoLab C Programming Solutions</h2>

    <a href="main/Neolab/SolW3.c" download class="download-link">
        <button class="btn-download">Download Week 3</button>
    </a>

    <a href="https://github.com/24paradox/NeolabSol/blob/main/Neolab/SolW4.c" download class="download-link">
        <button class="btn-download">Download Week 4</button>
    </a>

    <a href="https://github.com/24paradox/NeolabSol/blob/main/Neolab/SolW5.c" download class="download-link">
        <button class="btn-download">Download Week 5</button>
    </a>

    <a href="https://github.com/24paradox/NeolabSol/blob/main/Neolab/SolW6.c" download class="download-link">
        <button class="btn-download">Download Week 6</button>
    </a>

</body>
</html>
